name: cloudflare-pages

on:
  push:
    branches:
      - main
      - main-dev
  pull_request:
    branches:
      - main
      - main-dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
      PUBLIC_NAVER_MAP_CLIENT_ID: ${{ vars.PUBLIC_NAVER_MAP_CLIENT_ID || '' }}
      PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL || vars.APP_SUPABASE_URL || '' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.APP_SUPABASE_ANON_KEY || '' }}
      CF_PAGES_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install -g wrangler@4.74.0
      - run: npm ci
      - name: Resolve pages deploy environment
        shell: bash
        run: |
          if [ "${DEPLOY_BRANCH}" = "main-dev" ]; then
            echo "CLOUDFLARE_PAGES_PROJECT_NAME=daejeon-jamissue-pages-dev" >> "$GITHUB_ENV"
            echo "PUBLIC_APP_BASE_URL=https://api.dev.jamissue.com" >> "$GITHUB_ENV"
            echo "PAGES_CUSTOM_DOMAIN=dev.jamissue.com" >> "$GITHUB_ENV"
          else
            echo "CLOUDFLARE_PAGES_PROJECT_NAME=daejeon-jamissue-pages" >> "$GITHUB_ENV"
            echo "PUBLIC_APP_BASE_URL=https://api.daejeon.jamissue.com" >> "$GITHUB_ENV"
            echo "PAGES_CUSTOM_DOMAIN=daejeon.jamissue.com" >> "$GITHUB_ENV"
          fi
      - name: Ensure Pages project exists and production branch is target branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project_uri="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}"
          status_code="$(curl --silent --show-error --output /tmp/pages-project.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_uri}")"
          if [ "${status_code}" = "404" ]; then
            curl --fail --show-error --silent \
              --request POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT_NAME}\",\"production_branch\":\"${DEPLOY_BRANCH}\"}"
          elif [ "${status_code}" = "200" ]; then
            curl --fail --show-error --silent \
              --request PATCH \
              "${project_uri}" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"production_branch\":\"${DEPLOY_BRANCH}\"}"
          else
            cat /tmp/pages-project.json
            exit 1
          fi
      - name: Build static frontend
        run: npm run build
      - name: Ensure Pages custom domain exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          domain_uri="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}/domains/${PAGES_CUSTOM_DOMAIN}"
          status_code="$(curl --silent --show-error --output /tmp/pages-domain.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${domain_uri}")"
          if [ "${status_code}" = "404" ]; then
            curl --fail --show-error --silent \
              --request POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}/domains" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${PAGES_CUSTOM_DOMAIN}\"}"
          elif [ "${status_code}" != "200" ]; then
            cat /tmp/pages-domain.json
            exit 1
          fi
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy infra/nginx/site --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" --branch "${CF_PAGES_BRANCH}"
